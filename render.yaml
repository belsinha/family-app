services:
  # Single web service: API + Vite SPA. Deep links (/login, /chores, …) work without CDN rewrite rules.
  - type: web
    name: family-app-backend
    runtime: node
    plan: free
    # Bake API URL into the bundle when Render provides it (helps if the UI is ever served from another host).
    buildCommand: npm install && cd frontend && if [ -n "$RENDER_EXTERNAL_URL" ]; then export VITE_API_URL="${RENDER_EXTERNAL_URL}/api"; fi && npm run build && cd ../backend && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./data/family-app.db
      - key: CHORES_DATABASE_URL
        value: file:./data/chores.db
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # Optional: separate static site on Render requires a dashboard rewrite /* → /index.html, or links 404.
  # If you use the backend URL above for the app, you can delete the static site in the Render dashboard.
