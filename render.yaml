services:
  # Single web service: API + Vite SPA. Deep links (/login, /chores, …) work without CDN rewrite rules.
  # Build must run from repo root — not `cd backend && npm run build` alone (frontend must build first).
  #
  # Chores + main app SQLite live on a persistent disk so templates and family data survive deploys/restarts.
  # Render only allows disks on paid web services (not `plan: free`). If you switch back to free, remove the
  # `disk` block and expect an empty chores DB after each deploy unless you use an external database.
  - type: web
    name: family-app-backend
    runtime: node
    plan: starter
    disk:
      name: family-app-data
      mountPath: /opt/render/project/src/persist
      sizeGB: 5
    # Inline so deploy works even if this YAML is applied before `build:render` exists in package.json on main.
    buildCommand: npm install && cd frontend && if [ -n "$RENDER_EXTERNAL_URL" ]; then export VITE_API_URL="${RENDER_EXTERNAL_URL}/api"; fi && npm run build && cd ../backend && npm run build
    startCommand: cd backend && npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/project/src/persist/family-app.db
      - key: CHORES_DATABASE_URL
        value: file:/opt/render/project/src/persist/chores.db
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # Optional: separate static site on Render requires /* → /index.html rewrite, and build with
  # VITE_API_URL=https://<your-backend>.onrender.com (no /api suffix; the app adds /api).
  # frontend/public/api-config.js avoids 404/MIME errors; without VITE_API_URL, API calls hit the wrong host.
  # If you use the backend URL above for the app only, you can delete the static site in the Render dashboard.
