services:
  - type: web
    name: family-app-backend
    runtime: node
    plan: free
    buildCommand: npm install && cd backend && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./data/family-app.db
      - key: CHORES_DATABASE_URL
        value: file:./data/chores.db
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # Static site: use type web + runtime static so SPA rewrites apply (see routes below).
  - type: web
    name: family-app-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      # Client-side routes (/chores, /login, …) must serve index.html or refresh returns 404.
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://family-app-ksog.onrender.com/api

